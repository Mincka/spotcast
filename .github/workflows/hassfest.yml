name: Validate with hassfest

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/*
      - "*.md"
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: home-assistant/actions/hassfest@master

name: Bug report
description: Report a problem with Spotcast (stable or pre-release)
labels:
  - bug
  - pending-triage
assignees:
  - Mincka
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem! Before filing, please check the [configuration guide](https://github.com/Mincka/spotcast/blob/main/docs/config/spotcast_configuration.md) for setup questions. If you are upgrading from v5, the configuration process changed completely; see the [README](https://github.com/Mincka/spotcast#upgrading-from-v5).
  - type: checkboxes
    id: latest_version
    attributes:
      label: Version check
      options:
        - label: I am running the latest release (or latest pre-release, when testing one) of Spotcast.
          required: true
  - type: textarea
    validations:
      required: true
    attributes:
      label: The problem
      description: >-
        What were you trying to do, what did you expect, and what happened instead?
  - type: input
    validations:
      required: true
    attributes:
      label: Spotcast version
      description: >-
        Visible in [Settings ⇒ Devices & services ⇒ Spotcast](https://my.home-assistant.io/redirect/integration/?domain=spotcast) or in HACS. Pre-releases welcome; just give the exact version.
      placeholder: "6.0.0"
  - type: dropdown
    validations:
      required: true
    attributes:
      label: What type of installation are you running?
      description: >
        Can be found in [Settings ⇒ System ⇒ Repairs ⇒ Three Dots in Upper Right ⇒ System information](https://my.home-assistant.io/redirect/system_health/).
      multiple: false
      options:
        - Home Assistant OS
        - Home Assistant Container
        - Home Assistant Supervised
        - Home Assistant Core
  - type: textarea
    validations:
      required: true
    attributes:
      label: System Health details
      description: >
        Copy from [Settings ⇒ System ⇒ Repairs ⇒ Three Dots in Upper Right ⇒ System information](https://my.home-assistant.io/redirect/system_health/).
  - type: textarea
    attributes:
      label: Debug logs
      placeholder: "Drag-and-drop the downloaded log file here (do not copy-and-paste the content)."
      description: >-
        Debug logs usually make the difference between a quick fix and a long back-and-forth. Follow the [debug log guide](https://github.com/Mincka/spotcast/blob/main/docs/support/provide_a_debug_log.md): enable debug logging for Spotcast ([Settings ⇒ Devices & services ⇒ Spotcast](https://my.home-assistant.io/redirect/integration/?domain=spotcast)), reproduce the issue, disable debug logging, then drag the downloaded file here. For installation problems, provide HACS debug logs instead.
  - type: textarea
    attributes:
      label: Example YAML snippet
      description: |
        If applicable, the automation, script or action call that reproduces the problem.
      render: yaml
  - type: textarea
    attributes:
      label: Anything in the logs that might be useful?
      description: Error messages or stack traces from Settings ⇒ System ⇒ Logs.
      render: txt
  - type: textarea
    attributes:
      label: Additional information
